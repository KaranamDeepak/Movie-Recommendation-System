<!DOCTYPE html>
<html>

<head>

    <title>Movie Recommendation System</title>

    <style>

        body{
            background:#111827;
            color:white;
            font-family:Arial;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .container{
            width:500px;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            font-size:16px;
            border:none;
            border-radius:5px;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        ul{
            margin-top:20px;
            text-align:left;
        }

        li{
            margin:10px 0;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Movie Recommendation System 🎬</h1>

    <input
        type="text"
        id="movie"
        placeholder="Enter movie name"
    >

    <button onclick="recommendMovie()">
        Recommend
    </button>

    <ul id="result"></ul>

</div>

<script>

async function recommendMovie(){

    const movie =
    document.getElementById("movie").value;

    try{

        const response = await fetch(
            "http://127.0.0.1:5000/recommend",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    movie:movie
                })
            }
        );

        const data = await response.json();

        let output = "";

        data.recommendations.forEach(movie => {

            output += `<li>${movie}</li>`;

        });

        document.getElementById("result").innerHTML =
        output;

    }

    catch(error){

        console.log(error);

        document.getElementById("result").innerHTML =
        "Error connecting to Flask API";
    }

}

</script>

</body>

</html>
